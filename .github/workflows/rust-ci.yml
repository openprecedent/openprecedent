name: rust-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust-ci:
    name: rust-ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test
